<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Office Help Check-in</title>
</head>
<body>
  <h2>Recording your visit...</h2>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzk_M5DMH90XepLKWT6m9SFihrQYDeHaJwrP1q8s1yK3l-WvH_7iLAK-C9982CeRUW3ZQ/exec";

    const formData = new FormData();
    formData.append("office", "Help");

    fetch(SCRIPT_URL, {
      method: "POST",
      body: formData
    })
    .then(response => response.text())
    .then(data => {
      document.body.innerHTML = "<h2>Check-in recorded. Thank you.</h2>";
    })
    .catch(error => {
      document.body.innerHTML = "<h2>Error recording visit. Please try again.</h2>";
      console.error(error);
    });
  </script>
</body>
</html>
