<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Office Help Check-in</title>
</head>
<body>
  <h2>Recording your visit...</h2>

  <script>
    // Replace this URL with your deployed Google Apps Script Web App URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrfEHTwLLNeij-9Z5EDFHcapA5qcMGE3hDoe3n3oaKVNI0IAeJWqjclo39MCRurrAVtg/exec";

    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ office: "Help" })
    })
    .then(response => response.json())
    .then(data => {
      // Confirm success
      document.body.innerHTML = "<h2>Check-in recorded. Thank you.</h2>";
    })
    .catch(error => {
      // Display error message if request fails
      document.body.innerHTML = "<h2>Error recording visit. Please try again.</h2>";
      console.error("Error posting to Apps Script:", error);
    });
  </script>
</body>
</html>
